{% extends "base.html" %}

{% block title %}About — {{ site_settings.site_title }}{% endblock %}

{% block content %}
<div class="about-page">
    <h1>About</h1>
    {% if settings.about_html %}
        <div class="about-body">{{ settings.about_html|safe }}</div>
    {% else %}
        <p>No about page content yet.</p>
    {% endif %}
</div>
{% endblock %}
