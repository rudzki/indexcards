server {
    listen 80;
    server_name example.com;

    # Redirect HTTP to HTTPS (certbot will fill this in automatically,
    # but it's here for reference)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 3M;

    # Static files served directly by nginx
    location /static/ {
        alias /srv/indexcards/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploaded images (/uploads/<filename>) are intentionally NOT served
    # straight from disk here. They fall through to gunicorn below, so the
    # app's require_login_for_private_site gate applies — on a
    # site_visibility=registered ("private") site, uploads are not publicly
    # fetchable by URL. The app route (main.uploaded_file) validates the
    # filename and sets a long-lived immutable Cache-Control, so caching is
    # preserved even though the bytes proxy through the app.
    #
    # To trade this gate back for nginx-direct performance on a *public* site,
    # restore a `location /uploads/ { alias .../instance/uploads/; }` block.
    # To keep the gate AND nginx serving, switch main.uploaded_file to emit
    # X-Accel-Redirect into an `internal;` location instead.

    # Everything else goes to gunicorn
    location / {
        proxy_pass http://unix:/run/indexcards/indexcards.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
