server {
    listen 80;
    server_name example.com;

    # Redirect HTTP to HTTPS (certbot will fill this in automatically,
    # but it's here for reference)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 3M;

    # Static files served directly by nginx
    location /static/ {
        alias /srv/indexcards/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploaded images (site image, etc.)
    location /instance/uploads/ {
        alias /srv/indexcards/instance/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Everything else goes to gunicorn
    location / {
        proxy_pass http://unix:/run/indexcards/indexcards.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
